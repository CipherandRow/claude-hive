<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    text-align: center;
    max-width: 820px;
  }

  .bee { font-size: 64px; margin-bottom: 20px; }

  h1 {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: -2px;
    line-height: 1.1;
    margin-bottom: 16px;
  }

  h1 span { color: #fbbf24; }

  .sub {
    font-size: 20px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 36px;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 44px;
  }

  .stat-val {
    font-size: 38px;
    font-weight: 900;
    color: #fbbf24;
  }

  .stat-lbl {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-top: 4px;
  }

  .footer {
    position: absolute;
    bottom: 28px;
    left: 0; right: 0;
    text-align: center;
    font-size: 15px;
    color: rgba(255,255,255,0.25);
    font-weight: 600;
  }

  .footer span { color: rgba(251,191,36,0.7); }
</style>
</head>
<body>
  <div class="card">
    <div class="bee">&#x1F41D;</div>
    <h1>Swarm Intelligence<br>for <span>Claude Code</span></h1>
    <p class="sub">Bio-inspired multi-agent orchestration.<br>One file. No dependencies. MIT licensed.</p>
    <div class="stats">
      <div class="stat"><div class="stat-val">16</div><div class="stat-lbl">Mechanisms</div></div>
      <div class="stat"><div class="stat-val">241</div><div class="stat-lbl">Tests</div></div>
      <div class="stat"><div class="stat-val">0</div><div class="stat-lbl">Dependencies</div></div>
    </div>
  </div>
  <div class="footer">github.com/CipherandRow/<span>claude-hive</span></div>
</body>
</html>
